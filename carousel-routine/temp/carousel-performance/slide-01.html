<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800;900&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{width:1080px;height:1080px;overflow:hidden;background:#F8F7F3;color:#111;font-family:'Plus Jakarta Sans',sans-serif;position:relative}
.header{position:absolute;top:60px;left:70px;right:70px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.hleft{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#111}
.dot{width:14px;height:14px;border-radius:50%;background:#E16259}
.hright{display:flex;align-items:center;gap:15px}
.fw{font-family:'Instrument Serif',serif;font-style:italic;font-size:26px;color:#999}
.badge{width:46px;height:46px;background:#E16259;border-radius:50%;display:flex;justify-content:center;align-items:center;color:#fff;font-weight:800;font-size:17px}
.content{position:absolute;top:300px;left:70px;right:70px;z-index:5}
.kick{font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#E16259;margin-bottom:22px}
.headline{font-size:72px;font-weight:900;letter-spacing:-2.5px;line-height:1.05}
.headline em{font-family:'Instrument Serif',serif;font-style:italic;color:#E16259;font-weight:400;letter-spacing:0;padding-left:4px}
.body{font-size:29px;font-weight:500;color:#333;line-height:1.42;margin-top:30px;max-width:900px}
.line{width:64px;height:5px;background:#E16259;margin-top:34px}
.bottom{position:absolute;bottom:68px;left:70px;right:70px;display:flex;justify-content:space-between;align-items:center;z-index:5}
.swipe{font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#111}
.pill{background:#111;color:#fff;padding:20px 38px;border-radius:50px;font-size:21px;font-weight:800}
.pill em{font-family:'Instrument Serif',serif;font-style:italic;color:#E16259;font-weight:400;margin-left:6px}
</style></head><body>
<div class="header"><div class="hleft"><span class="dot"></span>Founders Wing / AI operator</div>
<div class="hright"><div class="fw">founders wing / 2026</div><div class="badge">01</div></div></div>
<div class="content"><div class="kick">Founder story</div><div class="headline">One person did the work of a <em>whole team</em></div><div class="body">And almost nobody noticed until the results showed up.</div></div>
<div class="bottom"><div></div><div class="swipe">SWIPE &rarr;</div></div>
</body></html>
